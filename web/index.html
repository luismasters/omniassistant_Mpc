<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Resaltado de sintaxis tipo Claude -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#1e1e1e',
                        darkSide: '#171717',
                        accent: '#cc785c',
                        accentHover: '#b8694e',
                        userMsg: '#2a2a28',
                        bubble: '#262624',
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html, body { height: 100%; }
        body {
            background-color: #1e1e1e;
        }

        /* Scrollbar discreto */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a38; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a48; }

        /* ===== Contenido renderizado en Markdown (estilo Claude) ===== */
        .markdown-body { line-height: 1.65; font-size: 0.97rem; color: #e8e6e3; }
        .markdown-body > *:first-child { margin-top: 0; }
        .markdown-body p { margin: 0 0 0.9rem 0; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.4rem; margin: 0 0 0.9rem 0; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.4rem; margin: 0 0 0.9rem 0; }
        .markdown-body li { margin-bottom: 0.35rem; }
        .markdown-body li > p { margin-bottom: 0.3rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 600; color: #f5f4f2; margin: 1.1rem 0 0.6rem 0; line-height: 1.3;
        }
        .markdown-body h1:first-child, .markdown-body h2:first-child, .markdown-body h3:first-child { margin-top: 0; }
        .markdown-body h1 { font-size: 1.3rem; }
        .markdown-body h2 { font-size: 1.15rem; }
        .markdown-body h3 { font-size: 1.03rem; }
        .markdown-body strong { color: #f5f4f2; font-weight: 600; }
        .markdown-body a { color: #d4a27f; text-decoration: underline; text-underline-offset: 2px; }
        .markdown-body blockquote {
            border-left: 3px solid #4a4a48; padding-left: 1rem; margin: 0 0 0.9rem 0; color: #b8b6b3;
        }
        .markdown-body hr { border-color: #3a3a38; margin: 1.2rem 0; }

        /* Código inline */
        .markdown-body code:not(pre code) {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.86em;
            color: #e0a479;
            background-color: rgba(204, 120, 92, 0.12);
            padding: 0.15rem 0.4rem;
            border-radius: 0.3rem;
        }

        /* Bloques de tabla */
        .markdown-body table { width: 100%; margin-bottom: 1rem; border-collapse: collapse; font-size: 0.92rem; overflow: hidden; border-radius: 0.5rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #3a3a38; padding: 0.55rem 0.8rem; text-align: left; }
        .markdown-body th { background-color: #2a2a28; color: #f5f4f2; font-weight: 600; }
        .markdown-body tr:nth-child(even) td { background-color: #232321; }
        .markdown-body tr:nth-child(odd) td { background-color: #1e1e1c; }

        /* ===== Bloques de código con header "tipo Claude" ===== */
        .code-block-wrapper {
            margin: 0 0 1rem 0;
            border-radius: 0.6rem;
            overflow: hidden;
            border: 1px solid #3a3a38;
            background-color: #161616;
        }
        .code-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.45rem 0.9rem;
            background-color: #1f1f1d;
            border-bottom: 1px solid #3a3a38;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.75rem;
            color: #9a9894;
        }
        .copy-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: transparent;
            border: none;
            color: #9a9894;
            font-size: 0.75rem;
            font-family: inherit;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
            transition: background-color 0.15s, color 0.15s;
        }
        .copy-btn:hover { background-color: #2f2f2d; color: #e8e6e3; }
        .copy-btn svg { width: 13px; height: 13px; }

        .markdown-body pre {
            margin: 0;
            padding: 1rem 1.1rem;
            overflow-x: auto;
            background-color: #161616 !important;
        }
        .markdown-body pre code.hljs {
            background-color: transparent !important;
            padding: 0;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.55;
        }

        /* ===== Burbuja de respuesta + botones de acción ===== */
        .ai-message-actions {
            display: flex;
            gap: 0.25rem;
            margin-top: 0.5rem;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .ai-message-block:hover .ai-message-actions { opacity: 1; }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: transparent;
            border: none;
            color: #8a8884;
            font-size: 0.78rem;
            cursor: pointer;
            padding: 0.35rem 0.5rem;
            border-radius: 0.4rem;
            transition: background-color 0.15s, color 0.15s;
        }
        .action-btn:hover { background-color: #2a2a28; color: #e8e6e3; }
        .action-btn svg { width: 14px; height: 14px; }

        /* Cursor de streaming */
        .cursor-blink::after {
            content: '▋';
            display: inline-block;
            margin-left: 1px;
            color: #cc785c;
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Textarea autoresize */
        #user-input {
            scrollbar-width: thin;
        }

        /* Botón de mic en estado "grabando" */
        .mic-recording {
            background-color: #cc785c !important;
            color: white !important;
            animation: pulse-mic 1.4s ease-in-out infinite;
        }
        @keyframes pulse-mic {
            0%, 100% { box-shadow: 0 0 0 0 rgba(204,120,92,0.5); }
            50% { box-shadow: 0 0 0 7px rgba(204,120,92,0); }
        }

        .sidebar-btn.active {
            background-color: #2a2a28;
            color: #f5f4f2;
        }

        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-darkBg text-gray-200 h-screen flex overflow-hidden font-sans">

    <!-- ============ SIDEBAR ============ -->
    <div class="w-64 bg-darkSide flex flex-col border-r border-[#2f2f2d] shrink-0">
        <div class="p-5 border-b border-[#2f2f2d]">
            <h1 class="text-xl font-semibold text-[#f0eee6] flex items-center gap-2">
                <span class="text-accent">◆</span> Argus
            </h1>
            <p id="lbl_modelo" class="text-xs text-[#9a9894] mt-2">🧠 Modelo: Gemini Flash</p>
        </div>

        <div class="flex-1 p-3 space-y-1">
            <button id="btn-modo-general" onclick="cambiarModo('general')"
                class="sidebar-btn active w-full text-left px-3 py-2.5 text-sm rounded-lg hover:bg-[#2a2a28] transition flex items-center gap-2.5">
                <span>💬</span> Chat General
            </button>
            <button id="btn-modo-planificador" onclick="cambiarModo('planificador')"
                class="sidebar-btn w-full text-left px-3 py-2.5 text-sm rounded-lg hover:bg-[#2a2a28] transition flex items-center gap-2.5">
                <span>📐</span> Modo Planificador
            </button>
            <button id="btn-modo-programador" onclick="cambiarModo('programador')"
                class="sidebar-btn w-full text-left px-3 py-2.5 text-sm rounded-lg hover:bg-[#2a2a28] transition flex items-center gap-2.5">
                <span>💻</span> Modo Programador
            </button>
        </div>

        <div class="p-4 text-xs text-[#6f6e6a] border-t border-[#2f2f2d] flex items-center justify-between">
            <span>v0.4.0 · Híbrido</span>
            <span id="mic-status" class="hidden text-[#cc785c] font-medium">● REC</span>
        </div>
    </div>

    <!-- ============ CHAT PRINCIPAL ============ -->
    <div class="flex-1 flex flex-col relative min-w-0">
        <div id="chat-container" class="flex-1 overflow-y-auto px-4 pb-48">
            <div class="max-w-[48rem] mx-auto w-full pt-10">
                <div id="welcome-wrap" class="flex items-center justify-center" style="height: 60vh;">
                    <h2 id="welcome-text" class="text-3xl font-medium text-[#4a4a48] text-center">¿En qué puedo ayudarte hoy?</h2>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 w-full pb-6 pt-2 bg-gradient-to-t from-darkBg via-darkBg to-transparent">
            <div class="max-w-[48rem] mx-auto px-4">
                <div class="flex gap-2 items-end bg-[#2a2a28] p-2.5 rounded-2xl border border-[#3a3a38] shadow-lg focus-within:border-[#525250] transition">
                    <button class="p-2.5 text-[#9a9894] hover:text-[#e8e6e3] hover:bg-[#343432] rounded-lg transition shrink-0" onclick="adjuntar()" title="Adjuntar archivos">
                        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>

                    <textarea id="user-input"
                        class="w-full bg-transparent border-none focus:ring-0 focus:outline-none text-[#e8e6e3] resize-none max-h-40 p-2.5 placeholder-[#6f6e6a]"
                        rows="1" placeholder="Cargando memoria y modelos…" disabled></textarea>

                    <button id="btn-mic" class="p-2.5 text-[#9a9894] hover:text-[#e8e6e3] hover:bg-[#343432] rounded-lg transition shrink-0 disabled:opacity-40 disabled:cursor-not-allowed" onclick="toggleMic()" title="Hablar (mantener F8 también funciona)" disabled>
                        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                    </button>

                    <button id="btn-send" class="p-2.5 bg-accent hover:bg-accentHover text-white rounded-xl transition font-bold shrink-0 disabled:opacity-40 disabled:cursor-not-allowed" onclick="enviar()" title="Enviar" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                    </button>
                </div>
                <div id="estado-carga" class="text-center text-xs text-[#cc785c] mt-2.5">⏳ Cargando memoria y modelos de IA, un momento…</div>
                <div id="hints-normales" class="hidden text-center text-xs text-[#5c5b58] mt-2.5">Enter · enviar &nbsp;&nbsp;·&nbsp;&nbsp; Shift+Enter · nueva línea &nbsp;&nbsp;·&nbsp;&nbsp; F8 · mantener para hablar</div>
            </div>
        </div>
    </div>

    <script>
        let currentMsgBlock = null;   // contenedor completo del mensaje IA actual (para hover/acciones)
        let currentMsgContent = null; // el div interno donde se inyecta el HTML markdown
        let isRecording = false;

        // ---------- Helpers de iconos ----------
        const ICONS = {
            copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
            check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
        };

        function removeWelcome() {
            document.getElementById('welcome-wrap')?.remove();
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        // ---------- Mensajes de usuario / sistema ----------
        function addMessage(role, text) {
            removeWelcome();
            const wrap = document.querySelector('#chat-container > div');
            const msgDiv = document.createElement('div');
            msgDiv.className = "fade-in mb-6";

            if (role === 'user') {
                msgDiv.innerHTML = `
                    <div class="flex justify-end">
                        <div class="bg-userMsg px-4 py-2.5 rounded-2xl max-w-[80%] border border-[#3a3a38]">
                            <p class="whitespace-pre-wrap text-[0.97rem] leading-relaxed">${escapeHtml(text)}</p>
                        </div>
                    </div>`;
            } else if (role === 'system') {
                msgDiv.className = "fade-in mb-3 flex justify-center";
                msgDiv.innerHTML = `<div class="text-xs text-[#8a8884] flex items-center gap-1.5 bg-[#232321] px-3 py-1.5 rounded-full border border-[#3a3a38]">⚙️ ${escapeHtml(text)}</div>`;
            }
            wrap.appendChild(msgDiv);
            scrollToBottom();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---------- Streaming de la IA ----------
        function startAIMessage() {
            removeWelcome();
            const wrap = document.querySelector('#chat-container > div');
            const msgDiv = document.createElement('div');
            msgDiv.className = "fade-in mb-6 flex gap-3 ai-message-block";
            msgDiv.dataset.rawText = "";
            msgDiv.innerHTML = `
                <div class="text-accent text-lg mt-0.5 shrink-0 select-none">◆</div>
                <div class="flex-1 min-w-0">
                    <div class="markdown-body cursor-blink streaming-content"></div>
                    <div class="ai-message-actions">
                        <button class="action-btn" onclick="copiarTextoMensaje(this)">
                            ${ICONS.copy}<span>Copiar</span>
                        </button>
                    </div>
                </div>`;
            wrap.appendChild(msgDiv);

            currentMsgBlock = msgDiv;
            currentMsgContent = msgDiv.querySelector('.streaming-content');
            scrollToBottom();
        }

        function updateLastMessage(htmlContent, rawText) {
            if (!currentMsgContent) return;
            currentMsgContent.innerHTML = htmlContent;
            if (typeof rawText === 'string' && currentMsgBlock) {
                currentMsgBlock.dataset.rawText = rawText;
            }
            enhanceCodeBlocks(currentMsgContent);
            scrollToBottom();
        }

        function finalizeLastMessage() {
            if (currentMsgContent) {
                currentMsgContent.classList.remove('cursor-blink');
            }
            currentMsgBlock = null;
            currentMsgContent = null;
        }

        // ---------- Resaltado de código + headers con botón copiar ----------
        function enhanceCodeBlocks(container) {
            const pres = container.querySelectorAll('pre');
            pres.forEach(pre => {
                if (pre.dataset.enhanced) {
                    // Solo re-resaltar (el contenido pudo cambiar durante streaming)
                    const codeEl = pre.querySelector('code');
                    if (codeEl && window.hljs) {
                        try { hljs.highlightElement(codeEl); } catch (e) {}
                    }
                    return;
                }
                pre.dataset.enhanced = "true";

                const codeEl = pre.querySelector('code');
                let lang = "texto";
                if (codeEl) {
                    const cls = [...codeEl.classList].find(c => c.startsWith('language-'));
                    if (cls) lang = cls.replace('language-', '');
                    if (window.hljs) {
                        try { hljs.highlightElement(codeEl); } catch (e) {}
                    }
                }

                const code = codeEl ? codeEl.textContent : pre.textContent;

                const wrapperDiv = document.createElement('div');
                wrapperDiv.className = "code-block-wrapper";

                const header = document.createElement('div');
                header.className = "code-block-header";
                header.innerHTML = `
                    <span>${escapeHtml(lang)}</span>
                    <button class="copy-btn" onclick="copiarCodigo(this)">
                        ${ICONS.copy}<span>Copiar</span>
                    </button>`;

                pre.parentNode.insertBefore(wrapperDiv, pre);
                wrapperDiv.appendChild(header);
                wrapperDiv.appendChild(pre);

                // Guardamos el código crudo para copiar sin tags HTML
                wrapperDiv.dataset.rawCode = code;
            });
        }

        function copiarCodigo(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const code = wrapper?.dataset.rawCode ?? '';
            navigator.clipboard.writeText(code).then(() => {
                flashCopied(btn);
            });
        }

        function copiarTextoMensaje(btn) {
            const block = btn.closest('.ai-message-block');
            const texto = block?.dataset.rawText ?? '';
            navigator.clipboard.writeText(texto).then(() => {
                flashCopied(btn);
            });
        }

        function flashCopied(btn) {
            const span = btn.querySelector('span');
            const original = span.textContent;
            span.textContent = "¡Copiado!";
            btn.innerHTML = ICONS.check + `<span>${"¡Copiado!"}</span>`;
            setTimeout(() => {
                btn.innerHTML = ICONS.copy + `<span>${original}</span>`;
            }, 1500);
        }

        // ---------- Envío de texto ----------
        function enviar() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (text) {
                input.value = '';
                autoResizeInput();
                addMessage('user', text);
                if (window.pywebview) {
                    window.pywebview.api.recibir_mensaje(text);
                }
            }
        }

        function cambiarModo(modo) {
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-modo-' + modo)?.classList.add('active');
            if (window.pywebview) window.pywebview.api.cambiar_modo(modo);
        }

        function adjuntar() {
            if (window.pywebview) window.pywebview.api.adjuntar();
        }

        // ---------- Micrófono (botón + F8) ----------
        function toggleMic() {
            if (!window.pywebview) return;
            if (!isRecording) {
                startRecordingUI();
                window.pywebview.api.iniciar_voz();
            } else {
                stopRecordingUI();
                window.pywebview.api.detener_voz_manual();
            }
        }

        function startRecordingUI() {
            isRecording = true;
            document.getElementById('btn-mic').classList.add('mic-recording');
            document.getElementById('mic-status').classList.remove('hidden');
        }

        function stopRecordingUI() {
            isRecording = false;
            document.getElementById('btn-mic').classList.remove('mic-recording');
            document.getElementById('mic-status').classList.add('hidden');
        }

        // Python llama a esto cuando termina de procesar la voz (por las dudas)
        function onVoiceFinished() {
            stopRecordingUI();
        }

        // Python llama a esto cuando modulos.ia (y la memoria/ChromaDB) terminó
        // de cargar en background. Hasta entonces, el chat queda deshabilitado
        // para evitar mandar mensajes que el backend todavía no puede procesar.
        function onMotorListo() {
            const input = document.getElementById('user-input');
            const btnMic = document.getElementById('btn-mic');
            const btnSend = document.getElementById('btn-send');

            input.disabled = false;
            btnMic.disabled = false;
            btnSend.disabled = false;
            input.placeholder = "Escribí tu mensaje...";
            input.focus();

            document.getElementById('estado-carga')?.classList.add('hidden');
            document.getElementById('hints-normales')?.classList.remove('hidden');
        }

        // F8: mantener presionado = grabar (igual que la versión de escritorio)
        let f8Pressed = false;
        document.addEventListener('keydown', function (e) {
            if (e.key === 'F8' && !f8Pressed) {
                f8Pressed = true;
                e.preventDefault();
                if (!isRecording) toggleMic();
            }
        });
        document.addEventListener('keyup', function (e) {
            if (e.key === 'F8') {
                f8Pressed = false;
                e.preventDefault();
                if (isRecording) toggleMic();
            }
        });

        // ---------- Input: autoresize + atajos ----------
        const inputEl = document.getElementById('user-input');

        function autoResizeInput() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
        }

        inputEl.addEventListener('input', autoResizeInput);

        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviar();
            }
        });
    </script>
</body>
</html>
